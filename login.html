<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – CoExcel EMS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --navy: #0a0f1e; --navy2: #111827; --navy3: #1a2235; --navy4: #212d45;
    --accent: #3b82f6; --accent2: #60a5fa; --accent-glow: rgba(59,130,246,0.15);
    --text: #f1f5f9; --text2: #94a3b8; --text3: #64748b;
    --border: rgba(255,255,255,0.07); --border2: rgba(59,130,246,0.25);
  }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--navy);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }
  .bg-glow {
    position: fixed; inset: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 60% 50% at 30% 20%, rgba(59,130,246,0.1) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 80% 80%, rgba(99,102,241,0.07) 0%, transparent 60%);
  }
  .bg-grid {
    position: fixed; inset: 0; pointer-events: none; opacity: 0.03;
    background-image: linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px);
    background-size: 48px 48px;
  }
  .card {
    background: var(--navy2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 44px;
    width: 100%; max-width: 440px;
    position: relative; z-index: 1;
    animation: slideUp 0.4s ease;
  }
  @keyframes slideUp { from { opacity:0; transform: translateY(24px); } to { opacity:1; transform: translateY(0); } }
  .logo-row {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem;
    color: var(--text); text-decoration: none; margin-bottom: 32px;
  }
  .logo-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 8px var(--accent);
  }
  .card h1 {
    font-family: 'Syne', sans-serif; font-size: 1.7rem;
    font-weight: 700; margin-bottom: 6px; color: var(--text);
  }
  .card .sub { font-size: 0.88rem; color: var(--text2); margin-bottom: 32px; }
  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: 0.82rem; font-weight: 500; color: var(--text2); margin-bottom: 7px; letter-spacing: 0.03em; }
  input[type="email"], input[type="password"], input[type="text"] {
    width: 100%; padding: 12px 16px;
    background: var(--navy3); border: 1px solid var(--border);
    border-radius: 10px; font-size: 0.9rem; color: var(--text);
    font-family: 'Inter', sans-serif; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input::placeholder { color: var(--text3); }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.12); }
  .password-wrap { position: relative; }
  .toggle-pw {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    cursor: pointer; color: var(--text3); font-size: 16px;
    background: none; border: none; padding: 0; line-height: 1;
  }
  .toggle-pw:hover { color: var(--text2); }
  .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .remember { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: var(--text2); cursor: pointer; }
  .remember input[type="checkbox"] {
    width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer;
    background: var(--navy3); border: 1px solid var(--border);
  }
  .forgot { font-size: 0.82rem; color: var(--accent2); text-decoration: none; font-weight: 500; }
  .forgot:hover { text-decoration: underline; }
  .btn-login {
    width: 100%; padding: 13px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 10px; font-size: 0.95rem;
    font-weight: 600; font-family: 'Syne', sans-serif;
    cursor: pointer; transition: all 0.2s; letter-spacing: 0.02em;
  }
  .btn-login:hover { background: #2563eb; transform: translateY(-1px); box-shadow: 0 8px 20px rgba(59,130,246,0.3); }
  .btn-login:active { transform: translateY(0); }
  .divider {
    text-align: center; margin: 22px 0; position: relative;
    font-size: 0.78rem; color: var(--text3);
  }
  .divider::before, .divider::after {
    content: ''; position: absolute; top: 50%; width: 42%; height: 1px;
    background: var(--border);
  }
  .divider::before { left: 0; } .divider::after { right: 0; }
  .signup-row { text-align: center; font-size: 0.85rem; color: var(--text2); }
  .signup-row a { color: var(--accent2); text-decoration: none; font-weight: 600; }
  .signup-row a:hover { text-decoration: underline; }
  .back { text-align: center; margin-top: 16px; }
  .back a { font-size: 0.82rem; color: var(--text3); text-decoration: none; transition: color 0.2s; }
  .back a:hover { color: var(--text2); }
  .alert {
    padding: 11px 14px; border-radius: 8px; font-size: 0.83rem;
    margin-bottom: 18px; display: none;
  }
  .alert-error { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
  .alert-success { background: rgba(16,185,129,0.1); color: #34d399; border: 1px solid rgba(16,185,129,0.2); }
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="bg-grid"></div>

<div class="card">
  <a href="index.html" class="logo-row">
    <div class="logo-dot"></div>
    CoExcel
  </a>
  <h1>Welcome back</h1>
  <p class="sub">Sign in to your employee account</p>

  <div class="alert alert-error" id="errorAlert"></div>
  <div class="alert alert-success" id="successAlert"></div>

  <form id="loginForm">
    <div class="form-group">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@coexcel.com" required>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <div class="password-wrap">
        <input type="password" id="password" placeholder="Enter your password" required>
        <button type="button" class="toggle-pw" onclick="togglePw('password', this)">👁</button>
      </div>
    </div>
    <div class="row">
      <label class="remember">
        <input type="checkbox" id="remember"> Remember me
      </label>
      <a href="#" class="forgot">Forgot password?</a>
    </div>
    <button type="submit" class="btn-login">Sign In</button>
  </form>

  <div class="divider">or</div>
  <div class="signup-row">Don't have an account? <a href="signup.html">Sign up</a></div>
  <div class="back"><a href="index.html">← Back to home</a></div>
</div>

<script>
  function togglePw(id, btn) {
    const inp = document.getElementById(id);
    if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
    else { inp.type = 'password'; btn.textContent = '👁'; }
  }
  function showAlert(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg; el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 3500);
  }
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    if (!email || !password) { showAlert('errorAlert', 'Please fill in all fields.'); return; }
    // TODO: Replace with Supabase Auth
    // const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    localStorage.setItem('isLoggedIn', 'true');
    localStorage.setItem('userEmail', email);
    showAlert('successAlert', 'Login successful! Redirecting...');
    setTimeout(() => window.location.href = 'dashboard.html', 1200);
  });
  if (localStorage.getItem('isLoggedIn') === 'true') window.location.href = 'dashboard.html';
</script>
</body>
</html>
